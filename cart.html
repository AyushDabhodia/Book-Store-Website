<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Cart</title>
<style>
body {
  font-family: Arial, sans-serif;
  padding: 30px;
  background: #f7f7f7;
}
h2 {
  text-align: center;
  color: #b13372;
}
table {
  width: 80%;
  margin: auto;
  border-collapse: collapse;
  background: white;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
th, td {
  padding: 12px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}
.total {
  font-weight: bold;
  color: #b13372;
}
button {
  background-color: #b13372;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 5px;
  cursor: pointer;
}
button:hover {
  background-color: #8a2459;
}
a {
  display: block;
  text-align: center;
  margin-top: 20px;
  color: #b13372;
  text-decoration: none;
  font-weight: bold;
}
a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
<h2>Your Cart</h2>

<table id="cart-table">
  <tr>
    <th>Book Title</th>
    <th>Quantity</th>
    <th>Price</th>
    <th>Amount</th>
    <th>Action</th>
  </tr>
</table>

<a href="catalouge.html">← Back to Catalogue</a>

<script>
function loadCart() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let table = document.getElementById("cart-table");

  // Clear existing rows except the header
  table.innerHTML = `
    <tr>
      <th>Book Title</th>
      <th>Quantity</th>
      <th>Price</th>
      <th>Amount</th>
      <th>Action</th>
    </tr>
  `;

  let total = 0;

  cart.forEach((item, index) => {
    let row = table.insertRow();

    row.insertCell(0).innerText = item.title;
    row.insertCell(1).innerText = item.quantity;
    row.insertCell(2).innerText = "₹" + item.price;
    let amount = item.price * item.quantity;
    row.insertCell(3).innerText = "₹" + amount;
    total += amount;

    let removeBtn = document.createElement("button");
    removeBtn.innerText = "Remove";
    removeBtn.onclick = () => removeItem(index);

    let actionCell = row.insertCell(4);
    actionCell.appendChild(removeBtn);
  });

  if (cart.length > 0) {
    let totalRow = table.insertRow();
    totalRow.classList.add("total");
    totalRow.insertCell(0).innerText = "";
    totalRow.insertCell(1).innerText = "";
    totalRow.insertCell(2).innerText = "Total:";
    totalRow.insertCell(3).innerText = "₹" + total;
    totalRow.insertCell(4).innerText = "";
  } else {
    let emptyRow = table.insertRow();
    emptyRow.insertCell(0).colSpan = 5;
    emptyRow.innerText = "Your cart is empty.";
  }
}

function removeItem(index) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart(); // Refresh cart display
}

loadCart();
</script>
</body>
</html>
