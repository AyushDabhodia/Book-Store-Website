<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login</title>
<style>
  /* Body & Card */
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card {
    background: #fff;
    max-width: 420px;
    width: 100%;
    padding: 30px 25px;
    border-radius: 12px;
    box-shadow: 0 12px 25px rgba(0,0,0,0.15);
    position: relative;
    transition: transform 0.3s;
  }
  .card:hover { transform: translateY(-5px); }

  /* Headings */
  h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
  }

  /* Input fields */
  input[type=text], input[type=password] {
    width: 100%;
    padding: 12px 0px 12px 0;
    margin: 6px 0 6px 0;
    border-radius: 6px;
    border: 2px solid #ccc;
    outline: none;
    font-size: 15px;
    transition: all 0.3s;
  }
  input:focus { border-color: #7f5af0; box-shadow: 0 0 8px rgba(127,90,240,0.3); }

  input.valid { border-color: #28a745; background-color: #e6ffed; }
  input.invalid { border-color: #dc3545; background-color: #ffe6e6; }

  .error {
    color: #dc3545;
    font-size: 0.85em;
    margin-bottom: 10px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .error.active { opacity: 1; }

  /* Buttons */
  .btns {
    display: flex;
    gap: 12px;
    margin-top: 15px;
  }
  button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
    background: #7f5af0;
    color: #fff;
  }
  button:hover { background: #6434c7; transform: translateY(-2px); }
  button[type="reset"] { background: #ccc; color: #333; }
  button[type="reset"]:hover { background: #aaa; }

  /* Success message */
  #msg {
    margin-top: 15px;
    font-weight: bold;
    text-align: center;
    color: #28a745;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #msg.show { opacity: 1; }
</style>
</head>
<body>
  <div class="card">
    <h2>Login Page</h2>
    <form id="loginForm" onsubmit="login(event)">
      <label>User Name:</label>
      <input type="text" id="uname" required>
      <div class="error" id="unameError">Name must contain only letters and be at least 6 characters.</div>

      <label>Password:</label>
      <input type="password" id="pwd" required>
      <div class="error" id="pwdError">Password must be at least 6 characters long.</div>

      <div class="btns">
        <button type="submit">Submit</button>
        <button type="reset" onclick="clearValidation()">Reset</button>
      </div>
    </form>
    <p id="msg">Hello — login successful (demo only).</p>
  </div>

<script>
const uname = document.getElementById('uname');
const pwd = document.getElementById('pwd');
const unameError = document.getElementById('unameError');
const pwdError = document.getElementById('pwdError');
const msg = document.getElementById('msg');

unameError.classList.remove('active');
pwdError.classList.remove('active');
msg.classList.remove('show');

// Real-time validation
uname.addEventListener('input', () => {
  if(/^[A-Za-z]{6,}$/.test(uname.value.trim())) {
    uname.classList.add('valid');
    uname.classList.remove('invalid');
    unameError.classList.remove('active');
  } else {
    uname.classList.add('invalid');
    uname.classList.remove('valid');
    unameError.classList.add('active');
  }
});

pwd.addEventListener('input', () => {
  if(pwd.value.trim().length >= 6) {
    pwd.classList.add('valid');
    pwd.classList.remove('invalid');
    pwdError.classList.remove('active');
  } else {
    pwd.classList.add('invalid');
    pwd.classList.remove('valid');
    pwdError.classList.add('active');
  }
});

function login(e) {
  e.preventDefault();
  let valid = true;

  if(!/^[A-Za-z]{6,}$/.test(uname.value.trim())) {
    uname.classList.add('invalid');
    unameError.classList.add('active');
    valid = false;
  }
  if(pwd.value.trim().length < 6) {
    pwd.classList.add('invalid');
    pwdError.classList.add('active');
    valid = false;
  }

  if(valid) {
    msg.textContent = `Hello ${uname.value} — login successful!`;
    msg.classList.add('show');
  } else {
    msg.classList.remove('show');
  }
}

function clearValidation() {
  uname.classList.remove('valid','invalid');
  pwd.classList.remove('valid','invalid');
  unameError.classList.remove('active');
  pwdError.classList.remove('active');
  msg.classList.remove('show');
}
</script>

</body>
</html>
