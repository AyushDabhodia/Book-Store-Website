<!-- FILE: index.html -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Online Bookstore - Frames Layout</title>
<style>
html,body{height:100%;margin:0;font-family:Arial,Helvetica,sans-serif}
/* layout: top (150px) / left (200px) + right (rest) */
.frame-top{height:130px;border-bottom:3px solid #e8b39b}
.frame-main{display:flex;height:calc(100% - 80px)}
.frame-left{width:200px;border-right:2px solid #e8b39b}
.frame-right{flex:1}
iframe{width:100%;height:100%;border:0}

body {
  background-color: #6f5b63;
}
</style>

<body>
<div class="frame-top"><iframe src="top.html" name="top"></iframe></div>
<div class="frame-main">
<div class="frame-left"><iframe src="left.html" name="left"></iframe></div>
<div class="frame-right"><iframe src="home.html" name="right"></iframe></div>
</div>
</body>
</html>
